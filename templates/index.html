<!DOCTYPE html>
<html>
<head>
<title>Music AI</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="sidebar">
<h2>🎧 Music AI</h2>
<a href="/">🏠 Home</a>
<a href="/liked">❤️ Liked</a>
<a href="/logout">🚪 Logout</a>
</div>

<div class="main">

<form method="POST" class="search-bar">
<input type="text" name="song" placeholder="Search any song...">
<button>Search</button>
</form>

<!-- Recommended -->
<div class="section">
<h2>✨ Recommended</h2>
<div class="scroll-container">
{% for s in recs %}
<div class="card">
<img src="{{s.image}}">
<h4>{{s.name}}</h4>
<p>{{s.artist}}</p>

<div class="actions">
<button onclick="play('{{s.name}}','{{s.preview}}','{{s.artist}}')">▶</button>
<button onclick="likeSong('{{s.name}}')">❤️</button>
</div>
</div>
{% endfor %}
</div>
</div>

<!-- History -->
<div class="section">
<h2>🕘 Recently Played</h2>
<div class="scroll-container">
{% for s in history %}
<div class="card">
<img src="{{s.image}}">
<h4>{{s.name}}</h4>
<p>{{s.artist}}</p>
<button onclick="play('{{s.name}}','{{s.preview}}','{{s.artist}}')">▶</button>
</div>
{% endfor %}
</div>
</div>

<!-- Trending -->
<div class="section">
<h2>🔥 Trending</h2>
<div class="scroll-container">
{% for s in trending %}
<div class="card">
<img src="{{s.image}}">
<h4>{{s.name}}</h4>
<p>{{s.artist}}</p>
<button onclick="play('{{s.name}}','{{s.preview}}','{{s.artist}}')">▶</button>
</div>
{% endfor %}
</div>
</div>

</div>

<div class="player">
<p id="now">Nothing playing</p>
<audio id="audio" controls></audio>
</div>

<script src="/static/script.js"></script>

</body>
</html>
