<!DOCTYPE html>
<html>
<head>
<title>Music App</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="sidebar">
    <h2>🎵 Music</h2>
    <a href="/">Home</a>
    <a href="/liked">❤️ Liked</a>
    <a href="/logout">Logout</a>
</div>

<div class="main">

<h1>Music Recommender</h1>

<form method="POST" class="search">
    <input name="song" placeholder="Search song..." required>
    <button>Search</button>
</form>

<h2>Recommended</h2>
<div class="row">
{% for s in recs %}
<div class="card">
<img src="{{s.image}}">
<h3>{{s.name}}</h3>
<p>{{s.artist}}</p>
<button onclick="play('{{s.name}}','{{s.preview}}')">▶</button>
<button onclick="like('{{s.name}}')">❤️</button>
</div>
{% endfor %}
</div>

<h2>Recently Played</h2>
<div class="row">
{% for h in history %}
<div class="small-card">{{h[0]}} - {{h[1]}}</div>
{% endfor %}
</div>

<h2>Trending</h2>
<div class="row">
{% for t in trending %}
<div class="small-card">{{t}}</div>
{% endfor %}
</div>

<audio id="player" controls></audio>

</div>

<script src="/static/script.js"></script>

</body>
</html>
