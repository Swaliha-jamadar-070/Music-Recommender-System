<!DOCTYPE html>
<html>
<head>
<title>Music Recommender 🎵</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body{
    font-family:Poppins;
    background:#0f2027;
    color:white;
    margin:0;
    padding-bottom:100px;
}

.header{
    display:flex;
    justify-content:space-between;
    padding:20px;
    background:#000;
}

.section{
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:#1c1c1c;
    padding:15px;
    border-radius:10px;
}

.cover{
    width:100%;
    height:200px;
    object-fit:cover;
}

button{
    margin:5px;
    padding:8px 12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.play-btn{ background:#28a745; color:white; }
.like-btn{ background:#444; color:white; }

.music-player{
    position:fixed;
    bottom:0;
    width:100%;
    background:#111;
    padding:10px;
}
</style>

<script>
document.addEventListener("DOMContentLoaded", function(){

    function playSong(btn){
        let preview = JSON.parse(btn.dataset.preview || "null");
        let name = JSON.parse(btn.dataset.name || "null");
        let artist = JSON.parse(btn.dataset.artist || "null");

        console.log("🔥 FUNCTION CALLED");
        console.log("🎵 Playing:", name);

        fetch('/track_play',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({song:name})
        })
        .then(res => res.json())
        .then(data => console.log("✅ API:", data))
        .catch(err => console.log("❌ ERROR:", err));

        let player = document.getElementById("player");
        let now = document.getElementById("nowPlaying");

        if(preview){
            player.src = preview;
            player.play();
            now.innerText = "🎶 Now Playing: " + name;
        }else{
            window.open(`https://youtube.com/results?search_query=${name} ${artist}`);
        }
    }

    function likeSong(btn){
        let name = JSON.parse(btn.dataset.name || "null");

        fetch('/like',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({song:name})
        })
        .then(res => res.json())
        .then(data => console.log("❤️ liked:", data))
        .catch(err => console.log("❌ ERROR:", err));
    }

    // 🔥 attach events manually (BEST WAY)
    document.querySelectorAll(".play-btn").forEach(btn=>{
        btn.addEventListener("click", ()=>playSong(btn));
    });

    document.querySelectorAll(".like-btn").forEach(btn=>{
        btn.addEventListener("click", ()=>likeSong(btn));
    });

});
</script>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <h2>🎧 Music Recommender</h2>
    <a href="/logout" style="color:white;">Logout</a>
</div>

<!-- SEARCH -->
<div class="section">
    <form method="POST">
        <input name="song" placeholder="Search song..." required style="padding:10px;">
        <button type="submit">Recommend</button>
    </form>
</div>

<!-- RECOMMENDATIONS -->
<div class="section">
<h3>✨ Recommended Songs</h3>

<div class="grid">
{% for song in recommendations %}
<div class="card">

<img src="{{ song.image }}" class="cover">

<h3>{{ song.name }}</h3>
<p>{{ song.artist }}</p>

<!-- ✅ SAFE PLAY BUTTON -->
<button 
class="play-btn"
onclick="playSong(this)"
data-preview='{{ song.preview | tojson | safe }}'
data-name='{{ song.name | tojson | safe }}'
data-artist='{{ song.artist | tojson | safe }}'>
▶ Play
</button>

<!-- ❤️ SAFE LIKE BUTTON -->
<button 
class="like-btn"
onclick="likeSong(this)"
data-name='{{ song.name | tojson | safe }}'>
❤️ Like
</button>

</div>
{% endfor %}
</div>
</div>

<!-- PLAYER -->
<div class="music-player">
    <p id="nowPlaying">No song playing</p>
    <audio id="player" controls></audio>
</div>

</body>
</html>
