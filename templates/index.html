<!DOCTYPE html>
<html>
<head>
<title>Music Recommender 🎵</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body{font-family:Poppins;background:#0f2027;color:white;margin:0;padding-bottom:100px;}
.header{display:flex;justify-content:space-between;padding:20px;background:#000;}
.section{padding:20px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;}
.card{background:#1c1c1c;padding:15px;border-radius:10px;}
.cover{width:100%;height:200px;object-fit:cover;}
.music-player{position:fixed;bottom:0;width:100%;background:#111;padding:10px;}
</style>

<script>
function playSong(btn){
    let preview = btn.dataset.preview;
    let name = btn.dataset.name;
    let artist = btn.dataset.artist;

    console.log("🎵 Playing:", name);

    fetch('/track_play',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({song:name})
    });

    let player = document.getElementById("player");
    let now = document.getElementById("nowPlaying");

    if(preview){
        player.src = preview;
        player.play();
        now.innerText = "Now Playing: " + name;
    }else{
        window.open(`https://youtube.com/results?search_query=${name} ${artist}`);
    }
}

function likeSong(btn){
    let name = btn.dataset.name;

    fetch('/like',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({song:name})
    });

    console.log("❤️ liked:", name);
}
</script>

</head>

<body>

<div class="header">
<h2>🎧 Music Recommender</h2>
<a href="/logout">Logout</a>
</div>

<div class="section">
<form method="POST">
<input name="song" placeholder="Search song..." required>
<button>Recommend</button>
</form>
</div>

<div class="section">
<h3>✨ Recommended</h3>
<div class="grid">
{% for song in recommendations %}
<div class="card">
<img src="{{ song.image }}" class="cover">
<h3>{{ song.name }}</h3>
<p>{{ song.artist }}</p>

<button 
onclick="playSong(this)"
data-preview="{{ song.preview }}"
data-name="{{ song.name }}"
data-artist="{{ song.artist }}">
▶ Play
</button>

<button 
onclick="likeSong(this)"
data-name="{{ song.name }}">
❤️
</button>

</div>
{% endfor %}
</div>
</div>

<div class="music-player">
<p id="nowPlaying">No song</p>
<audio id="player" controls></audio>
</div>

</body>
</html>
