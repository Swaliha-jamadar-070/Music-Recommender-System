<!DOCTYPE html>
<html>
<head>
<title>Music AI 🎧</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins;
}

body{
    background:linear-gradient(120deg,#0f2027,#203a43,#2c5364);
    color:white;
    overflow-y:auto;
}

/* ===== LAYOUT ===== */
.container{
    display:flex;
}

/* ===== SIDEBAR ===== */
.sidebar{
    width:220px;
    height:100vh;
    background:#000;
    padding:20px;
    position:fixed;
}

.sidebar h2{
    margin-bottom:30px;
}

.sidebar a{
    display:block;
    color:#bbb;
    margin:15px 0;
    text-decoration:none;
    transition:0.3s;
}

.sidebar a:hover{
    color:#1db954;
}

/* ===== CONTENT ===== */
.content{
    margin-left:220px;
    padding:30px;
    width:calc(100% - 220px);
}

/* ===== SEARCH BAR ===== */
.search-box{
    display:flex;
    justify-content:center;
    margin-bottom:30px;
}

.search-box input{
    width:60%;
    padding:15px;
    border:none;
    border-radius:30px 0 0 30px;
    outline:none;
    font-size:16px;
}

.search-box button{
    padding:15px 25px;
    border:none;
    border-radius:0 30px 30px 0;
    background:#1db954;
    color:white;
    cursor:pointer;
    font-weight:bold;
}

/* ===== SECTION ===== */
.section{
    margin-bottom:40px;
}

/* ===== HORIZONTAL SCROLL ===== */
.song-row{
    display:flex;
    gap:20px;
    overflow-x:auto;
    padding:10px 0;
}

.song-row::-webkit-scrollbar{
    height:6px;
}

.song-row::-webkit-scrollbar-thumb{
    background:#1db954;
    border-radius:10px;
}

/* ===== CARD ===== */
.card{
    min-width:200px;
    max-width:200px;
    background:#1e1e1e;
    padding:15px;
    border-radius:15px;
    transition:0.3s;
    position:relative;
}

.card:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px #1db954;
}

/* IMAGE FIX */
.card img{
    width:100%;
    height:220px;
    object-fit:cover;
    border-radius:12px;
}

/* TEXT */
.card h4{
    margin:10px 0 5px;
}

.card p{
    color:#aaa;
    font-size:14px;
}

/* PLAY BUTTON (overlay style) */
.play-btn{
    position:absolute;
    bottom:80px;
    right:15px;
    background:#1db954;
    border:none;
    border-radius:50%;
    width:45px;
    height:45px;
    color:white;
    font-size:16px;
    display:none;
    cursor:pointer;
}

.card:hover .play-btn{
    display:block;
}

/* LIKE BUTTON */
.like-btn{
    margin-top:10px;
    background:#333;
    border:none;
    padding:6px 10px;
    border-radius:6px;
    color:white;
    cursor:pointer;
}

/* ===== PLAYER ===== */
.player{
    position:fixed;
    bottom:0;
    left:220px;
    width:calc(100% - 220px);
    background:#111;
    padding:15px;
}

/* ===== HISTORY CARDS ===== */
.history-card{
    min-width:180px;
    background:#222;
    padding:10px;
    border-radius:10px;
}
</style>

<script>
function playSong(btn){
    let preview = btn.dataset.preview;
    let name = btn.dataset.name;
    let artist = btn.dataset.artist;

    fetch('/track_play',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({song:name})
    });

    let player = document.getElementById("audio");
    let now = document.getElementById("now");

    if(preview){
        player.src = preview;
        player.play();
        now.innerText = "🎶 " + name + " - " + artist;
    }else{
        window.open(`https://youtube.com/results?search_query=${name} ${artist}`);
    }
}

function likeSong(btn){
    let name = btn.dataset.name;

    fetch('/like',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({song:name})
    });

    btn.innerText = "❤️ Saved";
}
</script>
</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>🎧 Music AI</h2>
    <a href="/">🏠 Home</a>
    <a href="/liked">❤️ Liked</a>
    <a href="/logout">🚪 Logout</a>
</div>

<!-- CONTENT -->
<div class="content">

<!-- SEARCH -->
<form method="POST" class="search-box">
    <input name="song" placeholder="Search any song..." required>
    <button>Search</button>
</form>

<!-- RECOMMENDED -->
<div class="section">
<h2>✨ Recommended</h2>

<div class="song-row">
{% for s in recommendations %}
<div class="card">

<img src="{{ s.image }}">

<h4>{{ s.name }}</h4>
<p>{{ s.artist }}</p>

<button class="play-btn"
onclick="playSong(this)"
data-preview="{{ s.preview }}"
data-name="{{ s.name }}"
data-artist="{{ s.artist }}">
▶
</button>

<button class="like-btn"
onclick="likeSong(this)"
data-name="{{ s.name }}">
❤️ Like
</button>

</div>
{% endfor %}
</div>
</div>

<!-- HISTORY -->
<div class="section">
<h2>🕘 Recently Played</h2>

<div class="song-row">
{% for h in history %}
<div class="history-card">
{{ h[0] }}<br>
<span style="color:#aaa">{{ h[1] }}</span>
</div>
{% endfor %}
</div>
</div>

<!-- TRENDING -->
<div class="section">
<h2>🔥 Trending</h2>

<div class="song-row">
{% for t in trending %}
<div class="history-card">{{ t }}</div>
{% endfor %}
</div>
</div>

</div>
</div>

<!-- PLAYER -->
<div class="player">
<p id="now">Nothing playing</p>
<audio id="audio" controls style="width:100%"></audio>
</div>

</body>
</html>
