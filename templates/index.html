<!DOCTYPE html>
<html>
<head>
<title>Music AI</title>
<link rel="stylesheet" href="/static/style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>🎧 Music AI</h2>
    <a href="/">🏠 Home</a>
    <a href="/liked">❤️ Liked</a>
    <a href="/logout">🚪 Logout</a>
</div>

<div class="main">

<!-- HERO SEARCH -->
<div class="search-box">
    <form method="POST">
        <input name="song" placeholder="Search any song..." required>
        <button>Search</button>
    </form>
</div>

<!-- RECOMMENDED -->
<h2>✨ Recommended For You</h2>
<div class="row">
{% for s in recs %}
<div class="card">
<img src="{{s.image}}">
<h3>{{s.name}}</h3>
<p>{{s.artist}}</p>

<button class="play" onclick="play('{{s.name}}','{{s.preview}}','{{s.artist}}')">▶ Play</button>
<button class="like" onclick="like('{{s.name}}')">❤️</button>

</div>
{% endfor %}
</div>

<!-- HISTORY LIKE YOUTUBE -->
<h2>🕒 Recently Played</h2>
<div class="row">
{% for h in history %}
<div class="small-card" onclick="quickPlay('{{h[0]}}','{{h[1]}}')">
🎵 {{h[0]}} <br>
<small>{{h[1]}}</small>
</div>
{% endfor %}
</div>

<!-- TRENDING -->
<h2>🔥 Trending</h2>
<div class="row">
{% for t in trending %}
<div class="small-card">
{{t}}
</div>
{% endfor %}
</div>

</div>

<!-- PLAYER -->
<div class="player-bar">
<span id="now">Nothing playing</span>
<audio id="player" controls></audio>
</div>

<script src="/static/script.js"></script>

</body>
</html>
