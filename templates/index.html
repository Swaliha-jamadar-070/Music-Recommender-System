<!DOCTYPE html>
<html>
<head>
<title>Music Recommender</title>

<style>
body{
    background:#0f2027;
    color:white;
    font-family:Arial;
}

.header{
    background:black;
    padding:15px;
    display:flex;
    justify-content:space-between;
}

.section{
    padding:20px;
}

.grid{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.card{
    background:#1c1c1c;
    padding:10px;
    width:200px;
    border-radius:10px;
}

img{
    width:100%;
    height:150px;
}

button{
    margin:5px;
    padding:5px;
}
</style>

<script>
function playSong(name, preview){
    fetch('/track_play',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({song:name})
    });

    let player = document.getElementById("player");

    if(preview){
        player.src = preview;
        player.play();
    }else{
        window.open("https://youtube.com/results?search_query="+name);
    }
}

function likeSong(name){
    fetch('/like',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({song:name})
    }).then(()=>alert("Liked!"));
}
</script>
</head>

<body>

<div class="header">
<h2>🎧 Music App</h2>
<a href="/logout" style="color:white;">Logout</a>
</div>

<div class="section">
<form method="POST">
<input name="song" placeholder="Search song">
<button>Recommend</button>
</form>
</div>

<!-- RECOMMENDED -->
<div class="section">
<h3>Recommended</h3>
<div class="grid">
{% for s in recommendations %}
<div class="card">
<img src="{{s.image}}">
<p>{{s.name}}</p>
<p>{{s.artist}}</p>

<button onclick="playSong('{{s.name}}','{{s.preview}}')">▶ Play</button>
<button onclick="likeSong('{{s.name}}')">❤️ Like</button>
</div>
{% endfor %}
</div>
</div>

<!-- HISTORY -->
<div class="section">
<h3>Recently Played</h3>
<ul>
{% for h in history %}
<li>{{h[0]}} - {{h[1]}}</li>
{% endfor %}
</ul>
</div>

<!-- TRENDING -->
<div class="section">
<h3>Trending</h3>
<ul>
{% for t in trending %}
<li>{{t}}</li>
{% endfor %}
</ul>
</div>

<div class="section">
<audio id="player" controls></audio>
</div>

</body>
</html>
