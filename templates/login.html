<!DOCTYPE html>
<html>
<head>
<title>Login 🎧</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
*{
    box-sizing:border-box;
    transition:0.3s;
}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

/* CONTAINER */
.container{
    display:flex;
    background:#1c1c1c;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* IMAGE SIDE */
.image-box{
    width:300px;
    background:url('https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4') no-repeat center;
    background-size:cover;
}

/* LOGIN BOX */
.login-box{
    padding:40px;
    width:300px;
    text-align:center;
}

.login-box h2{
    margin-bottom:20px;
}

/* INPUT */
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    background:#2a2a2a;
    color:white;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#1db954;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#1ed760;
}

/* TEXT */
p{
    margin-top:15px;
    font-size:14px;
}

a{
    color:#1db954;
    text-decoration:none;
}

/* MOBILE */
@media(max-width:768px){
    .container{
        flex-direction:column;
    }

    .image-box{
        width:100%;
        height:180px;
    }

    .login-box{
        width:100%;
    }
}
</style>

</head>

<body>

<div class="container">

    <!-- IMAGE -->
    <div class="image-box"></div>

    <!-- LOGIN FORM -->
    <div class="login-box">
        <h2>🎧 Welcome Back</h2>

        <!-- FORM FIXED -->
        <form method="POST" autocomplete="off">

            <input type="text" name="username" placeholder="Username" autocomplete="off" required>

            <!-- Hidden trick to disable popup -->
            <input type="password" style="display:none">

            <input type="password" name="passcode" placeholder="Password" autocomplete="new-password" required>

            <button>Login</button>

        </form>

        <p>New user? <a href="/register">Register</a></p>
    </div>

</div>

</body>
</html>
