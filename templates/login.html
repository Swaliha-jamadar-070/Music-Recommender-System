<!DOCTYPE html>
<html>
<head>
<title>Login 🎧</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
*{ box-sizing:border-box; }

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.container{
    display:flex;
    background:#1c1c1c;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
    max-width:90%;
}

.image-box{
    width:300px;
    background:url('https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4') center/cover;
}

.login-box{
    padding:40px;
    width:300px;
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    background:#2a2a2a;
    color:white;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#1db954;
    color:white;
}

button:hover{ background:#1ed760; }

@media(max-width:768px){
    .container{ flex-direction:column; }
    .image-box{ display:none; }
    .login-box{ width:100%; padding:20px; }
}
</style>

</head>

<body>

<div class="container">

<div class="image-box"></div>

<div class="login-box">
<h2>🎧 Welcome Back</h2>

<form method="POST">
<input type="text" name="username" placeholder="Username" required>
<input type="password" name="password" placeholder="Password" required>
<button>Login</button>
</form>

</div>

</div>

</body>
</html>
