<!DOCTYPE html>
<html>
<head>
    <title>Liked Songs ❤️</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="sidebar">
    <h2>🎧 Music AI</h2>
    <a href="/">🏠 Home</a>
    <a href="/liked">❤️ Liked</a>
    <a href="/logout">🚪 Logout</a>
</div>

<div class="main">
<h1>❤️ Your Liked Songs</h1>

<div class="scroll-container">
{% for s in songs %}
<div class="card" onclick="play('{{s.name}}','{{s.preview}}','{{s.artist}}')">
<img src="{{s.image}}">
<h3>{{s.name}}</h3>
<p>{{s.artist}}</p>
</div>
{% endfor %}
</div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
