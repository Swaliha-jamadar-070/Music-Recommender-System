<!DOCTYPE html>
<html>
<head>
<title>Liked</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="main">
<h1>❤️ Liked Songs</h1>

<div class="scroll-container">
{% for s in songs %}
<div class="card">
<img src="{{s.image}}">
<h4>{{s.name}}</h4>
<p>{{s.artist}}</p>
<button onclick="play('{{s.name}}','{{s.preview}}','{{s.artist}}')">▶</button>
</div>
{% endfor %}
</div>

<a href="/">⬅ Back</a>
</div>

<script src="/static/script.js"></script>

</body>
</html>
